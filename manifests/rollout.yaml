apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/daria-tanasie/ci_cd_lab@sha256:sha256:799b3e29b2f592f5835e427396def3d534f7b79db0c2ca2623eb9c2877048280
          ports:
            - containerPort: 8083
          imagePullPolicy: Always
